# ============================================================
#  AGREGAR ESTAS RUTAS AL application.properties (o .yml)
#  del api-gateway existente para enrutar al nuevo
#  visit-calendar-service (puerto 8086)
# ============================================================
#
#  Si el gateway usa application.yml, equivale a:
#
#  spring:
#    cloud:
#      gateway:
#        routes:
#          - id: visit-calendar-service
#            uri: lb://visit-calendar-service
#            predicates:
#              - Path=/api/calendar/**, /api/visits/**, /api/visit-requests/**
#            filters:
#              - StripPrefix=0
#
# ============================================================
#  Si el gateway usa application.properties, agregar:
# ============================================================

spring.cloud.gateway.routes[5].id=visit-calendar-service
spring.cloud.gateway.routes[5].uri=lb://visit-calendar-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/calendar/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[6].id=visit-calendar-service-visits
spring.cloud.gateway.routes[6].uri=lb://visit-calendar-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/visits/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=0

spring.cloud.gateway.routes[7].id=visit-calendar-service-requests
spring.cloud.gateway.routes[7].uri=lb://visit-calendar-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/visit-requests/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=0

# ============================================================
#  También agregar estos endpoints como PÚBLICOS si el gateway
#  tiene una lista de rutas que no requieren JWT.
#  (Busca la sección de "public paths" o "excluded paths")
#
#  Rutas PÚBLICAS (acceso sin token — portal del cliente):
#    GET  /api/calendar         → clientes pueden ver disponibilidad
#    POST /api/visit-requests   → clientes solicitan cita
#
#  Rutas PROTEGIDAS (requieren JWT de agente):
#    POST /api/visits
#    GET  /api/visits/**
#    GET  /api/visit-requests/agent/**
#    PATCH /api/visit-requests/**
# ============================================================

