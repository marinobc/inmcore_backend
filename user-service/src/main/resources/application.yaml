server:
  port: 8084

spring:
  application:
    name: user-service

  data:
    mongodb:
      uri: mongodb://admin:admin@localhost:27017/inmobiliaria_db?authSource=admin

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    prefer-ip-address: true
  instance:
    hostname: localhost
    prefer-ip-address: true

logging:
  level:
    com.inmobiliaria.user_service.service.PersonService: INFO
  file:
    name: logs/user-service-audit.log