server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: identity-service
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/auth/**,/users/**,/users,/audit/**
          filters:
            - AuthenticationFilter
        - id: access-control-service
          uri: lb://ACCESS-CONTROL-SERVICE
          predicates:
            - Path=/roles/**,/permissions/**,/roles,/permissions
          filters:
            - AuthenticationFilter
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/notifications/**
          filters:
            - AuthenticationFilter
        - id: property-service
          uri: lb://PROPERTY-SERVICE
          predicates:
            - Path=/properties/**,/properties,/documents/**,/documents
          filters:
            - AuthenticationFilter
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/persons/**,/persons,/audit-logs/**,/audit-logs
          filters:
            - AuthenticationFilter
        - id: visit-calendar-service
          uri: lb://visit-calendar-service
          predicates:
            - Path=/api/calendar/**, /api/visits/**, /api/visit-requests/**
          filters:
            - AuthenticationFilter
        # POST /api/visits/{id}/reassignment → Solicitar reasignación
        - id: request-reassignment
          uri: lb://visit-calendar-service
          predicates:
            - Path=/api/visits/*/reassignment
            - Method=POST
          filters:
            - AuthenticationFilter # Valida JWT y agrega X-User-Id al header
        # PUT /api/reassignments/{id}/reply → Aceptar / Rechazar
        - id: reply-reassignment
          uri: lb://visit-calendar-service
          predicates:
            - Path=/api/reassignments/*/reply
            - Method=PUT
          filters:
            - AuthenticationFilter
        # GET /api/reassignments/received → Bandeja de solicitudes
        - id: received-reassignments
          uri: lb://visit-calendar-service
          predicates:
            - Path=/api/reassignments/received
            - Method=GET
          filters:
            - AuthenticationFilter
        # GET /api/reassignments/pending/count → Badge de notificación
        - id: count-pending-reassignments
          uri: lb://visit-calendar-service
          predicates:
            - Path=/api/reassignments/pending/count
            - Method=GET
          filters:
            - AuthenticationFilter
        - id: favorites-route
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/favoritos/**
          filters:
            - AuthenticationFilter
        # POST /api/operations/{id}/receipts → Attach receipt (multipart)
        - id: operation-receipt-attach
          uri: lb://operation-service
          predicates:
            - Path=/api/operations/*/receipts
            - Method=POST
          filters:
            - AuthenticationFilter
        # GET /api/operations/{id}/receipts → List receipts
        - id: operation-receipt-list
          uri: lb://operation-service
          predicates:
            - Path=/api/operations/*/receipts
            - Method=GET
          filters:
            - AuthenticationFilter
        # DELETE /api/operations/{id}/receipts/{receiptId} → Delete receipt
        - id: operation-receipt-delete
          uri: lb://operation-service
          predicates:
            - Path=/api/operations/*/receipts/*
            - Method=DELETE
          filters:
            - AuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: true

logging:
  level:
    root: ERROR
    "[com.inmobiliaria.api_gateway]": DEBUG
