server:
  port: 8083

spring:
  application:
    name: notification-service

  data:
    mongodb:
      uri: mongodb://admin:admin@localhost:27017/inmobiliaria_db?authSource=admin

  mail:
    host: localhost
    port: 1025
    username: 
    password: 
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  mail:
    from: no-reply@realestate.local

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    prefer-ip-address: true
  instance:
    hostname: localhost
    prefer-ip-address: true